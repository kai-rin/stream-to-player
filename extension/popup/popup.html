<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Stream to Player</title>
  <style>
    body {
      width: 320px;
      min-height: 100px;
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    #site-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 6px 8px;
      background: #16213e;
      border-radius: 6px;
    }

    #site-name { font-weight: 600; font-size: 12px; }

    #site-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .badge-live { background: #e53935; color: white; }
    .badge-vod  { background: #1976d2; color: white; }

    #page-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11px;
      color: #9e9e9e;
    }

    #quality-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    #quality-row label {
      font-size: 11px;
      color: #9e9e9e;
      white-space: nowrap;
    }

    #quality-select {
      flex: 1;
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
    }

    #tool-indicator {
      font-size: 11px;
      color: #666;
      text-align: right;
      margin-bottom: 8px;
    }

    .btn-row { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    #btn-play { background: #e53935; color: white; }

    #status {
      margin-top: 8px;
      min-height: 16px;
      font-size: 12px;
      text-align: center;
    }
    .status-ok      { color: #4caf50; }
    .status-error   { color: #f44336; }
    .status-loading { color: #ffa726; }

    #unsupported {
      text-align: center;
      padding: 16px 12px;
      color: #666;
    }
    #unsupported p { margin: 0 0 6px; }
    #unsupported small { font-size: 11px; }

    #custom-url-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #333;
    }

    #custom-url-divider {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-bottom: 8px;
    }

    #custom-url-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    #custom-url-input {
      flex: 1;
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 12px;
      outline: none;
    }
    #custom-url-input:focus { border-color: #555; }
    #custom-url-input::placeholder { color: #555; }

    #btn-custom-play {
      background: #e53935;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 0 12px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #btn-custom-play:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-custom-play:hover:not(:disabled) { opacity: 0.85; }

    #custom-tool-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    #custom-tool-select, #custom-quality-select {
      flex: 1;
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
    }

    #custom-status {
      min-height: 16px;
      font-size: 12px;
      text-align: center;
    }

    #footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    #settings-link {
      font-size: 11px;
      color: #555;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    #settings-link:hover { color: #888; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #ffa726;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="main-ui" style="display:none">
    <div id="site-info">
      <span id="site-name"></span>
      <span id="site-badge"></span>
      <span id="page-title"></span>
    </div>

    <div id="quality-row">
      <label for="quality-select">品質:</label>
      <select id="quality-select"></select>
    </div>

    <div id="tool-indicator">ツール: <span id="tool-name"></span></div>

    <div class="btn-row">
      <button class="btn" id="btn-play">&#9654; 再生</button>
    </div>

    <div id="status"></div>
  </div>

  <div id="unsupported" style="display:none">
    <p>このサイトは対応していません</p>
  </div>

  <div id="custom-url-section">
    <div id="custom-url-divider">または URL を直接入力</div>
    <div id="custom-url-row">
      <input type="url" id="custom-url-input" placeholder="https://...">
      <button id="btn-custom-play" title="再生">&#9654;</button>
    </div>
    <div id="custom-tool-row">
      <select id="custom-tool-select">
        <option value="yt-dlp">yt-dlp</option>
        <option value="streamlink">streamlink</option>
      </select>
      <select id="custom-quality-select"></select>
    </div>
    <div id="custom-status"></div>
  </div>

  <div id="footer">
    <button id="settings-link">&#9881; 設定</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

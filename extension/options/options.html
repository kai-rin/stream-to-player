<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Stream to Player - 設定</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --text: #222;
      --text-sub: #444;
      --text-label: #555;
      --text-radio: #333;
      --hint: #888;
      --border: #ccc;
      --hr: #ddd;
      --input-bg: #fff;
      --accent: #1976d2;
      --accent-hover: #1565c0;
      --btn-test-bg: #e8f5e9;
      --btn-test-color: #2e7d32;
      --btn-test-border: #a5d6a7;
      --btn-test-hover: #c8e6c9;
      --btn-reset-bg: #eee;
      --btn-reset-color: #333;
      --btn-reset-hover: #ddd;
      --ok: #4caf50;
      --error: #e53935;
    }
    [data-theme="dark"] {
      --bg: #1a1a2e;
      --text: #e0e0e0;
      --text-sub: #b0b0b0;
      --text-label: #9e9e9e;
      --text-radio: #ccc;
      --hint: #777;
      --border: #444;
      --hr: #333;
      --input-bg: #16213e;
      --accent: #42a5f5;
      --accent-hover: #1e88e5;
      --btn-test-bg: #1b3a1b;
      --btn-test-color: #66bb6a;
      --btn-test-border: #2e7d32;
      --btn-test-hover: #264a26;
      --btn-reset-bg: #2a2a3e;
      --btn-reset-color: #ccc;
      --btn-reset-hover: #363650;
      --ok: #66bb6a;
      --error: #ef5350;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #1a1a2e;
        --text: #e0e0e0;
        --text-sub: #b0b0b0;
        --text-label: #9e9e9e;
        --text-radio: #ccc;
        --hint: #777;
        --border: #444;
        --hr: #333;
        --input-bg: #16213e;
        --accent: #42a5f5;
        --accent-hover: #1e88e5;
        --btn-test-bg: #1b3a1b;
        --btn-test-color: #66bb6a;
        --btn-test-border: #2e7d32;
        --btn-test-hover: #264a26;
        --btn-reset-bg: #2a2a3e;
        --btn-reset-color: #ccc;
        --btn-reset-hover: #363650;
        --ok: #66bb6a;
        --error: #ef5350;
      }
    }

    body {
      max-width: 640px;
      margin: 32px auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      padding: 0 16px 32px;
    }
    h1 { font-size: 20px; border-bottom: 2px solid var(--accent); padding-bottom: 8px; }
    h2 { font-size: 15px; color: var(--text-sub); margin-top: 24px; }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-label);
    }
    .theme-toggle select {
      padding: 3px 6px;
      font-size: 12px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .form-group {
      margin: 12px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .form-group > label { font-size: 12px; color: var(--text-label); font-weight: 600; }
    input[type="text"], select {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 13px;
      background: var(--input-bg);
      color: var(--text);
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .hint { font-size: 11px; color: var(--hint); }

    .radio-group { display: flex; gap: 16px; align-items: center; }
    .radio-group label { font-weight: normal; color: var(--text-radio); cursor: pointer; }

    .btn-row { margin-top: 24px; display: flex; gap: 12px; }
    .btn {
      padding: 8px 24px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #btn-save   { background: var(--accent); color: white; }
    #btn-save:hover { background: var(--accent-hover); }
    #btn-test   { background: var(--btn-test-bg); color: var(--btn-test-color); border: 1px solid var(--btn-test-border); }
    #btn-test:hover { background: var(--btn-test-hover); }
    #btn-reset  { background: var(--btn-reset-bg); color: var(--btn-reset-color); }
    #btn-reset:hover { background: var(--btn-reset-hover); }

    #status-msg {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
      white-space: pre-wrap;
    }
    .ok    { color: var(--ok); }
    .error { color: var(--error); }

    hr { border: none; border-top: 1px solid var(--hr); margin: 20px 0; }
  </style>
</head>
<body>
  <div class="header-row">
    <h1>Stream to Player 設定</h1>
    <div class="theme-toggle">
      <select id="theme-select">
        <option value="system">システム</option>
        <option value="light">ライト</option>
        <option value="dark">ダーク</option>
      </select>
    </div>
  </div>

  <h2>プレイヤー</h2>
  <div class="form-group">
    <label>デフォルトプレイヤー</label>
    <div class="radio-group">
      <label><input type="radio" name="player" value="mpv" id="player-mpv"> mpv</label>
      <label><input type="radio" name="player" value="vlc" id="player-vlc"> VLC</label>
    </div>
  </div>
  <div class="form-group">
    <label for="player-path">プレイヤーの実行ファイルパス</label>
    <input type="text" id="player-path" placeholder="空欄 = 自動検索">
    <span class="hint">空欄の場合、ネイティブホストがPATHやよくある場所から自動検索します</span>
  </div>

  <hr>

  <h2>ダウンロードツール</h2>
  <div class="form-group">
    <label>ツール優先設定</label>
    <div class="radio-group">
      <label><input type="radio" name="toolOverride" value="auto" id="tool-auto"> 自動</label>
      <label><input type="radio" name="toolOverride" value="streamlink" id="tool-streamlink"> streamlink優先</label>
      <label><input type="radio" name="toolOverride" value="yt-dlp" id="tool-ytdlp"> yt-dlp優先</label>
    </div>
    <span class="hint">「自動」: ライブ配信はstreamlink、VOD/アーカイブはyt-dlpを使用</span>
  </div>

  <hr>

  <h2>品質・フォーマット</h2>
  <div class="form-group">
    <label for="quality-streamlink">streamlink デフォルト品質</label>
    <select id="quality-streamlink">
      <option value="best">best (最高画質)</option>
      <option value="1080p">1080p</option>
      <option value="720p">720p</option>
      <option value="480p">480p</option>
      <option value="360p">360p</option>
      <option value="worst">worst (最低画質)</option>
    </select>
  </div>
  <div class="form-group">
    <label for="quality-ytdlp">yt-dlp デフォルトフォーマット</label>
    <select id="quality-ytdlp">
      <option value="bestvideo+bestaudio/best">最高画質 (bestvideo+bestaudio)</option>
      <option value="bestvideo[height<=1080]+bestaudio/best[height<=1080]">1080p以下</option>
      <option value="bestvideo[height<=720]+bestaudio/best[height<=720]">720p以下</option>
      <option value="bestaudio">音声のみ</option>
    </select>
  </div>

  <hr>

  <div class="btn-row">
    <button class="btn" id="btn-save">保存</button>
    <button class="btn" id="btn-test">接続テスト</button>
    <button class="btn" id="btn-reset">デフォルトに戻す</button>
  </div>

  <div id="status-msg"></div>

  <script src="options.js"></script>
</body>
</html>
